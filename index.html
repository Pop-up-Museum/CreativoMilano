<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creativo Milano — Design &amp; Build Studio</title>
<meta name="description" content="Creativo Milano designs, builds and maintains museums, theme parks, monuments and urban landmarks around the world.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23FCB040'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FAF8F3; --ink:#18181A; --ink-soft:#5C5C57;
    --red:#BF1E2E; --orange:#F1592A; --yellow:#FCB040; --green:#8CC63F; --azure:#25AAE1; --blue:#0F75BC;
    --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:var(--font-body);color:var(--ink);background:var(--cream);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    min-height:100vh;padding:2rem;text-align:center;overflow:hidden;}

  .mini-logo{position:fixed;top:24px;left:6%;display:flex;align-items:center;gap:.5rem;font-family:var(--font-display);
    font-weight:700;font-size:.95rem;letter-spacing:-.01em;opacity:0;animation:fade-in .6s ease forwards;animation-delay:.1s;}
  .mini-logo img{height:24px;width:auto;}
  .mini-logo span{color:var(--blue);font-weight:500;}
  @keyframes fade-in{to{opacity:1;}}

  .sound-toggle{position:fixed;top:24px;right:6%;width:30px;height:30px;padding:4px;background:none;border:none;
    cursor:pointer;color:var(--ink-soft);opacity:0;animation:fade-in .6s ease forwards;animation-delay:.15s;
    transition:transform .2s ease,color .2s ease;}
  .sound-toggle svg{width:100%;height:100%;}
  .sound-toggle:hover{transform:scale(1.08);color:var(--ink);}

  .icon-row{display:flex;gap:1.8rem;margin-bottom:2.6rem;flex-wrap:wrap;justify-content:center;}
  .pop-icon{width:54px;height:54px;opacity:0;transform:scale(.3) translateY(14px);
    animation:pop-in .6s cubic-bezier(.34,1.56,.64,1) forwards;animation-delay:calc(var(--i) * .15s + .3s);}
  .pop-icon svg{width:100%;height:100%;color:var(--c);}
  @keyframes pop-in{to{opacity:1;transform:scale(1) translateY(0);}}

  h1.type-line{font-family:var(--font-display);font-weight:700;font-size:clamp(1.8rem,5vw,3rem);
    min-height:1.3em;letter-spacing:-.01em;}
  .cursor{display:inline-block;width:3px;background:var(--ink);margin-left:4px;animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}

  .enter-link{margin-top:2.6rem;font-family:var(--font-mono);font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;
    background:var(--yellow);color:var(--ink);padding:1rem 1.9rem;border-radius:40px;text-decoration:none;
    opacity:0;transform:translateY(10px);transition:opacity .5s ease,transform .25s ease,box-shadow .25s ease;
    display:inline-block;}
  .enter-link.show{opacity:1;transform:translateY(0);}
  .enter-link:hover{transform:translateY(-3px);box-shadow:0 14px 24px -12px rgba(0,0,0,.25);}

  @media (max-width:600px){
    .pop-icon{width:42px;height:42px;}
    .icon-row{gap:1.1rem;}
  }

  @media (prefers-reduced-motion:reduce){
    .mini-logo,.pop-icon{animation:none;opacity:1;transform:none;}
    .enter-link{transition:none;}
  }
</style>
</head>
<body>

<div class="mini-logo">Creativo<span>Milano</span></div>

<button class="sound-toggle" id="soundToggle" type="button" aria-label="Mute sound"></button>

<div class="icon-row" aria-hidden="true">
  <div class="pop-icon" style="--c:var(--blue);--i:0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9 12 3l9 6"/><path d="M5 9v10M9 9v10M15 9v10M19 9v10"/><path d="M3 19h18"/></svg>
  </div>
  <div class="pop-icon" style="--c:var(--orange);--i:1">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="11" r="7"/><path d="M12 4v14M5 11h14M7.5 5.5l9 11M16.5 5.5l-9 11"/><path d="M9 21h6"/></svg>
  </div>
  <div class="pop-icon" style="--c:var(--red);--i:2">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 21V9l2-5 2 5v12"/><path d="M7 21h10"/></svg>
  </div>
  <div class="pop-icon" style="--c:var(--azure);--i:3">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V11h4v10M9 21V6h4v15M15 21V14h4v7"/><path d="M3 21h18"/></svg>
  </div>
  <div class="pop-icon" style="--c:var(--green);--i:4">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4c0 8-6 14-14 14H4c0-8 6-14 14-14h2z"/><path d="M9 15 19 5"/></svg>
  </div>
</div>

<h1 class="type-line" id="typeLine"><span class="cursor" id="cursor" style="display:none;"></span></h1>

<a class="enter-link" id="enterLink" href="creativo-milano-landing.html">Enter the studio →</a>

<script>
  const text = "We are Creativo.";
  const typeLine = document.getElementById('typeLine');
  const cursor = document.getElementById('cursor');
  const enterLink = document.getElementById('enterLink');
  const soundToggle = document.getElementById('soundToggle');
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- sound toggle (preference remembered across visits) ----
  const ICON_ON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 5V4L8 9H4Z"/><path d="M16 8a5 5 0 0 1 0 8"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>';
  const ICON_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 5V4L8 9H4Z"/><path d="M16 9l5 5M21 9l-5 5"/></svg>';
  let soundEnabled = localStorage.getItem('creativoSound') !== 'off';

  function refreshSoundIcon(){
    soundToggle.innerHTML = soundEnabled ? ICON_ON : ICON_OFF;
    soundToggle.setAttribute('aria-label', soundEnabled ? 'Mute sound' : 'Unmute sound');
  }
  refreshSoundIcon();

  soundToggle.addEventListener('click', ()=>{
    soundEnabled = !soundEnabled;
    localStorage.setItem('creativoSound', soundEnabled ? 'on' : 'off');
    refreshSoundIcon();
  });

  // ---- short, cheerful chime played on entering the studio ----
  let audioCtx = null;
  function playEnterChime(){
    if(!soundEnabled) return;
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5 — a bright, resolved little arpeggio
      const now = audioCtx.currentTime;
      notes.forEach((freq, idx)=>{
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle'; // warm, rounded tone — avoids a harsh or piercing edge
        osc.frequency.value = freq;
        const start = now + idx * 0.1;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.18, start + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.38);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + 0.4);
      });
    } catch(e){ /* Web Audio unavailable — fail silently, navigation still works */ }
  }

  function showEnter(){ enterLink.classList.add('show'); }

  if(reduced){
    typeLine.textContent = text;
    showEnter();
  } else {
    const iconSequenceDelay = 4 * 150 + 300 + 600 + 150; // last icon's delay + duration + small buffer
    setTimeout(()=>{
      cursor.style.display = 'inline-block';
      let i = 0;
      const interval = setInterval(()=>{
        typeLine.textContent = text.slice(0, i + 1);
        typeLine.appendChild(cursor);
        i++;
        if(i === text.length){
          clearInterval(interval);
          setTimeout(showEnter, 300);
        }
      }, 70);
    }, iconSequenceDelay);
  }

  enterLink.addEventListener('click', function(e){
    e.preventDefault();
    playEnterChime();
    document.body.style.transition = 'opacity .4s ease';
    document.body.style.opacity = '0';
    setTimeout(()=>{ window.location.href = enterLink.getAttribute('href'); }, 600);
  });
</script>

</body>
</html>
